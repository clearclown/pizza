# brand_conflicts.yaml — Places fuzzy match の混入ケースを蓄積するナレッジベース
#
# 目的: 「同じ種類のブランド混入を二度と見逃さない」
# 運用: 実データで新たな誤合致を発見したら、以下のフォーマットで必ず追記する。
#
# 追加手順 (再発防止プロトコル):
#   1. E2E で「brand X 検索に Y が混入した」ことを確認
#   2. pattern は Y の displayName を `normalizeForBrandMatch` 相当で正規化
#      (小文字化、空白 /  / 中黒 / ASCII ハイフン除去、長音 "ー" は残す)
#   3. このファイルの brands[X].conflicts に新エントリを追加
#   4. internal/dough/brand_filter_test.go の TestIsKnownConflict_* に
#      最低 1 ケース追加して回帰テスト化
#   5. go test ./... でグリーン確認
#
# スキーマ:
#   version: int
#   updated_at: ISO8601 date
#   brands:
#     "<brand 文字列>":
#       allow:              # (optional) 正当な別名 (テスト用)
#         - "<正規化済み文字列>"
#       conflicts:
#         - pattern: "<正規化済み文字列>"
#           first_sighted: ISO8601 date
#           example: "生 displayName"
#           area: "検出した地域 (新宿 / 渋谷 / ...)"
#           note: "どういう別ブランドか短い説明"

