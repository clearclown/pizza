# franchisee_registry.yaml — 加盟店運営会社 (真のメガフランチャイジー) Ground Truth
#
# 目的: PI-ZZA の原点 = 「個別加盟店の運営会社を特定する」。
#       店舗ページには公開されていないが、他ソース (FC 本部公式サイトの
#       operating_company ページ、IR 資料、業界ニュース、gBizINFO 等) から
#       ファクトチェック済みの franchisee 情報を蓄積する。
#
# 運用:
#  - 追加は原則 2 つ以上の独立ソースで裏取りすること
#  - 必ず corporate_number (国税庁 13 桁) を記録 (同名会社との混同防止)
#  - source_urls は複数記録 (単一ソースに依存しない)
#  - 店舗数は取得日と共に記録 (時系列で変動)
#  - Fast Fitness Japan のような本部 (master franchisor) はここではなく
#    franchisors view で管理 (operator_type='franchisor' で自動分類)

version: 2
updated_at: "2026-04-23"
source_ref:
  - https://www.bc01.net/article/ranking_202408_1_120/  # ビジネスチャンス誌 2024年版 メガジー 1-120位
