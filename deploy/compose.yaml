# 🍕 PI-ZZA セルフホスト — docker compose / podman compose / podman-compose 互換
#
# 本ファイルは **PI-ZZA 独自の gRPC サービス群** のみを定義する。
# Firecrawl (M2 Kitchen) は独立コンテナスタックなので、別ファイル
# `compose.firecrawl.yaml` で起動する (両方必要な場合は -f を 2 つ渡す)。
#
# 起動例:
#   # PI-ZZA 本体のみ (Firecrawl は SaaS モードで利用)
#   docker compose -f deploy/compose.yaml --profile app up -d
#
#   # PI-ZZA + Firecrawl セルフホスト
#   docker compose -f deploy/compose.yaml -f deploy/compose.firecrawl.yaml \
#                  --profile app --profile firecrawl up -d
#
# podman でも同じコマンドが動く。

name: pi-zza

networks:
  pizza-net:
    driver: bridge

volumes:
  pizza-data:       # SQLite / CSV 出力

services:
  # ─── M1 Seed (Go) ─────────────────────────────────────────────────
  dough-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.dough
    container_name: pizza-dough
    restart: unless-stopped
    environment:
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      GRID_CELL_KM: ${GRID_CELL_KM:-1.0}
      MAX_CONCURRENCY: ${MAX_CONCURRENCY:-8}
    ports:
      - "50051:50051"
    networks:
      - pizza-net
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:50051"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    profiles: ["app"]

  # ─── M3 Delivery (Python) ─────────────────────────────────────────
  delivery-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.delivery
    container_name: pizza-delivery
    restart: unless-stopped
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      LLM_MODEL: ${LLM_MODEL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "50053:50053"
    networks:
      - pizza-net
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:50053"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    profiles: ["app"]

  # ─── 🔥 Oven (Go Orchestrator) ────────────────────────────────────
  pizza-orchestrator:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.pizza
    container_name: pizza-orchestrator
    restart: "no"  # CLI 的に使うので常駐しない
    depends_on:
      dough-service:
        condition: service_healthy
      delivery-service:
        condition: service_healthy
    environment:
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      FIRECRAWL_MODE: ${FIRECRAWL_MODE:-saas}
      FIRECRAWL_API_URL: ${FIRECRAWL_API_URL:-http://firecrawl-api:3002}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}
      SEED_SERVICE_ADDR: dough-service:50051
      DELIVERY_SERVICE_ADDR: delivery-service:50053
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PIZZA_DB_PATH: /var/pizza/pizza.sqlite
      PIZZA_OUTPUT_DIR: /var/pizza/output
    volumes:
      - pizza-data:/var/pizza
    networks:
      - pizza-net
    profiles: ["app"]

  # ─── 📦 Box UI (Streamlit) ────────────────────────────────────────
  box-ui:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.box-ui
    container_name: pizza-box-ui
    restart: unless-stopped
    environment:
      PIZZA_DB_PATH: /var/pizza/pizza.sqlite
    volumes:
      - pizza-data:/var/pizza:ro
    ports:
      - "8501:8501"
    networks:
      - pizza-net
    profiles: ["ui"]
