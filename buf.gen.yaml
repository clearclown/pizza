version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/clearclown/pizza/gen/go
plugins:
  # Go message types
  - remote: buf.build/protocolbuffers/go
    out: gen/go
    opt:
      - paths=source_relative
  # Go gRPC server/client stubs
  - remote: buf.build/grpc/go
    out: gen/go
    opt:
      - paths=source_relative
      - require_unimplemented_servers=true
  # Python message types — pin to v31 to emit gencode matching protobuf 6.x
  # (grpcio-tools currently requires protobuf<7)
  - remote: buf.build/protocolbuffers/python:v31.1
    out: gen/python
  # Python gRPC server/client stubs
  - remote: buf.build/grpc/python
    out: gen/python
  # Python typing stubs
  - remote: buf.build/protocolbuffers/pyi:v31.1
    out: gen/python
