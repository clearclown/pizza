name: ✨ Feature Request
description: 新機能や改善の提案
title: "[feat] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ご提案ありがとうございます 🍕
        既存 issue / discussions に類似案がないか検索してからお願いします。

  - type: textarea
    id: motivation
    attributes:
      label: 動機 / Motivation
      description: どんな課題を解決したいか
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 提案 / Proposal
      description: どう実現するか（API / UI / アルゴリズム案）
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 代替案 / Alternatives considered

  - type: dropdown
    id: module
    attributes:
      label: 関連モジュール / Related module
      multiple: true
      options:
        - M1 Seed (dough)
        - M2 Kitchen (toppings)
        - M3 Delivery (courier)
        - M4 Box (BI)
        - Oven (orchestrator)
        - proto / gRPC
        - CI / docs
        - 新規モジュール / New

  - type: checkboxes
    id: contribution
    attributes:
      label: 実装意思
      options:
        - label: 自分で PR を送ってもよい（TDD 規約に従う）
