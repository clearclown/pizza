name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Go
  go:
    name: Go ${{ matrix.go }} tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.22", "1.23"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - name: go build
        run: go build ./...
      - name: go vet
        run: go vet ./...
      - name: go test
        # Phase 0 は Red テストが存在するため失敗を許容。Phase 1 で外す。
        continue-on-error: true
        run: go test -race -cover -coverprofile=coverage.out ./...
      - name: Upload coverage
        if: matrix.go == '1.22'
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out

  # golangci-lint
  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61

  # Python
  python:
    name: Python ${{ matrix.python }} tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Setup Python
        run: uv python install ${{ matrix.python }}
      - name: Install deps
        run: uv sync --all-packages
      - name: Ruff lint
        run: uv run ruff check
      - name: pytest
        working-directory: services/delivery
        run: uv run pytest -v
